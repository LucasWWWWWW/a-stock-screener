name: Daily A-share screener

on:
  schedule:
    # 10:00 UTC = 18:00 北京时间(收盘后),周一到周五
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r screener/requirements.txt

      - name: Snapshot previous stocks.json
        run: |
          if [ -f web/data/stocks.json ]; then
            python -c "
            import json, pathlib
            src = json.loads(pathlib.Path('web/data/stocks.json').read_text(encoding='utf-8'))
            prev = {
                'generated_at': src.get('generated_at'),
                'trade_date': src.get('trade_date'),
                'codes': [s['code'] for s in src.get('stocks', [])],
                'codes_meta': {s['code']: {'name': s['name'], 'industry': s.get('industry','')} for s in src.get('stocks', [])},
            }
            pathlib.Path('web/data/stocks.prev.json').write_text(json.dumps(prev, ensure_ascii=False), encoding='utf-8')
            print('snapshot saved:', len(prev['codes']))
            "
          fi

      - name: Run screener
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python screener/fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/stocks.json web/data/stocks.prev.json || git add web/data/stocks.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            DATE=$(date -u -d "+8 hours" "+%Y-%m-%d")
            git commit -m "data: refresh stocks.json ($DATE)"
            git push
          fi
