<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e1014">
<title>A股选股 · 多条件筛选</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>A股选股</h1>
      <div class="meta">
        <span id="generated-at">加载中...</span>
        <span id="result-count"></span>
      </div>
    </div>
    <div class="header-right">
      <button id="broadcast-btn" class="broadcast-btn" title="点击播放 AI 主播日报">
        <span class="bc-icon">▶</span>
        <span class="bc-text">AI 主播日报</span>
      </button>
      <button id="share-btn" class="header-action" title="复制当前筛选条件的分享链接">🔗 分享</button>
    </div>
  </div>
  <div id="broadcast-transcript" class="broadcast-transcript hidden"></div>
</header>

<main>
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>筛选条件</h2>
      <div class="sidebar-actions">
        <button id="check-all">全选</button>
        <button id="uncheck-all">全不选</button>
        <button id="reset-thresholds" title="将所有阈值恢复为默认">重置阈值</button>
      </div>
    </div>
    <ul id="criteria-list"></ul>
    <p class="disclaimer">
      数据每日北京时间 18:00 自动更新。本站仅提供量化信号汇总,投资有风险,决策需自负。
    </p>
  </aside>

  <section id="results">
    <div id="list-toolbar" class="list-toolbar hidden">
      <input id="search-input" type="text" placeholder="🔍 搜索代码/名称…" autocomplete="off">
      <select id="sort-select">
        <option value="n_pass">通过条数 ↓</option>
        <option value="market_cap_asc">市值 ↑</option>
        <option value="market_cap_desc">市值 ↓</option>
        <option value="pe_asc">PE ↑</option>
        <option value="pb_asc">PB ↑</option>
        <option value="dv_desc">股息率 ↓</option>
        <option value="code">代码 ↑</option>
      </select>
      <div class="tab-switch">
        <button class="tab active" data-tab="all">全部</button>
        <button class="tab" data-tab="fav">⭐ <span id="fav-count">0</span></button>
        <button class="tab" data-tab="portfolio">📋 我的持仓</button>
      </div>
    </div>
    <div id="main-content">
      <div class="empty">加载中...</div>
    </div>
  </section>
</main>

<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
</body>
</html>
